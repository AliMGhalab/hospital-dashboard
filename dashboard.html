<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Alert Dashboard</title>
</head>
<body>
  <h1>Active Alerts</h1>
  <ul id="alerts"></ul>

  <!-- Test buttons -->
  <button onclick="simulateAlert('S1 ALERT')">Simulate S1</button>
  <button onclick="simulateAlert('S2 ALERT')">Simulate S2</button>
  <button onclick="simulateAlert('S3 ALERT')">Simulate S3</button>
  <button onclick="simulateAlert('NURSE CALL')">Simulate Nurse</button>
  <button onclick="resetAlerts()">Reset</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
      authDomain: "msesalert-b972d.firebaseapp.com",
      databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "msesalert-b972d",
      storageBucket: "msesalert-b972d.firebasedestorage.app",
      messagingSenderId: "992963491194",
      appId: "1:992963491194:web:f0d0b95343114e067e52c3"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const alertsRef = ref(db, 'alerts');
    const alertsList = document.getElementById('alerts');

    // Listen for new alerts in Firebase
    onChildAdded(alertsRef, (snapshot) => {
      const li = document.createElement('li');
      li.textContent = snapshot.val().message;
      alertsList.appendChild(li);
    });

    // Simulate alert functions
    window.simulateAlert = (msg) => { push(alertsRef, { message: msg }); }
    window.resetAlerts = () => { remove(alertsRef); alertsList.innerHTML = ''; }

    // Firebase Messaging
    const messaging = getMessaging(app);

    // Request notification permission and get token
    Notification.requestPermission().then(permission => {
      if (permission === 'granted') {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then((registration) => {
            console.log('Service Worker registered:', registration);
            getToken(messaging, {
              vapidKey: 'BOLqGcfL-JPtqJTRC6PrkQfD72J-EtesJmqBY4HEvgO5oIKlFrEP8h3yaF7soTdf6-psElXFfbzd1bmSOMgF7Mg',
              serviceWorkerRegistration: registration
            }).then(token => {
              console.log('Device token:', token);
            });
          });
      } else {
        console.log('Notification permission denied.');
      }
    });

    // Handle foreground messages
    onMessage(messaging, (payload) => {
      const { title, body } = payload.notification || {};
      if (title && body && Notification.permission === 'granted') {
        new Notification(title, { body });
      }
    });

    if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/firebase-messaging-sw.js')
    .then((registration) => {
      console.log('Service Worker registered:', registration);

      // Get the FCM token
      getToken(messaging, {
        vapidKey: 'BOLqGcfL-JPtqJTRC6PrkQfD72J-EtesJmqBY4HEvgO5oIKlFrEP8h3yaF7soTdf6-psElXFfbzd1bmSOMgF7Mg',
        serviceWorkerRegistration: registration
      })
      .then((currentToken) => {
        if (currentToken) {
          console.log('Device token:', currentToken);
          alert('Device token copied to console!'); // optional
        } else {
          console.log('No token available. Request permission to generate one.');
        }
      })
      .catch((err) => console.log('Error getting token:', err));
    });
}
    
  </script>
</body>
</html>
